services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: legalintel
      POSTGRES_USER: legaluser
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaluser -d legalintel"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://legaluser:localpassword@postgres:5432/legalintel
      UPLOAD_DIR: /tmp/uploads
      LOG_LEVEL: INFO
      USE_GCP: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
